<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="manifest" href="/manifest.json" />
        <link rel="apple-touch-icon" href="/icons/icon-192.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta
            name="description"
            content="compare by Thaker — Compare prices across marketplaces for products, taxi, food and more"
        />
        <meta name="theme-color" content="#4f46e5" />
        <title>compare — by Thaker</title>

        <!-- Google Fonts: Inter + Noto Sans Thai -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans+Thai:wght@100..900&display=swap"
            rel="stylesheet"
        />

        <style>
            /* Critical CSS: prevent flash of unstyled content */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html {
                scroll-behavior: smooth;
            }
            body {
                font-family:
                    "Inter",
                    "Noto Sans Thai",
                    system-ui,
                    -apple-system,
                    sans-serif;
                background-color: #0f0f23;
                color: #e2e8f0;
                min-height: 100vh;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            #root {
                min-height: 100vh;
            }

            /* Page loading splash */
            #splash {
                position: fixed;
                inset: 0;
                z-index: 9999;
                background: linear-gradient(
                    135deg,
                    #0f0f23 0%,
                    #1a1a3e 50%,
                    #0f0f23 100%
                );
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 20px;
                transition:
                    opacity 0.5s ease,
                    visibility 0.5s ease;
            }
            #splash.hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            .splash-logo {
                font-size: 3rem;
                animation: splash-float 2s ease-in-out infinite;
            }
            .splash-title {
                font-size: 1.75rem;
                font-weight: 800;
                background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing: -0.02em;
            }
            .splash-subtitle {
                font-size: 0.875rem;
                color: #64748b;
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }
            .splash-spinner {
                width: 40px;
                height: 40px;
                border: 3px solid rgba(99, 102, 241, 0.2);
                border-top-color: #6366f1;
                border-radius: 50%;
                animation: splash-spin 0.8s linear infinite;
            }
            .splash-dots {
                display: flex;
                gap: 6px;
                margin-top: 8px;
            }
            .splash-dot {
                width: 6px;
                height: 6px;
                background: #6366f1;
                border-radius: 50%;
                animation: splash-dot-bounce 1.2s ease-in-out infinite;
            }
            .splash-dot:nth-child(2) {
                animation-delay: 0.15s;
                background: #a855f7;
            }
            .splash-dot:nth-child(3) {
                animation-delay: 0.3s;
                background: #ec4899;
            }

            @keyframes splash-float {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-8px);
                }
            }
            @keyframes splash-spin {
                to {
                    transform: rotate(360deg);
                }
            }
            @keyframes splash-dot-bounce {
                0%,
                80%,
                100% {
                    transform: scale(0.6);
                    opacity: 0.5;
                }
                40% {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            /* Scrollbar styling */
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            ::-webkit-scrollbar-track {
                background: #0f0f23;
            }
            ::-webkit-scrollbar-thumb {
                background: #334155;
                border-radius: 3px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: #475569;
            }

            /* Selection color */
            ::selection {
                background: rgba(99, 102, 241, 0.3);
                color: #e2e8f0;
            }
        </style>
    </head>
    <body>
        <!-- Loading splash screen -->
        <div id="splash">
            <div class="splash-logo">🛒</div>
            <div class="splash-title">Thaker's Quest</div>
            <div class="splash-subtitle">Comparing Thai Marketplaces 🛒</div>
            <div class="splash-spinner"></div>
            <div class="splash-dots">
                <div class="splash-dot"></div>
                <div class="splash-dot"></div>
                <div class="splash-dot"></div>
            </div>
        </div>

        <!-- React root -->
        <div id="root"></div>

        <script type="module" src="/src/main.tsx"></script>
        <script>
            // Hide splash once React has mounted
            window.addEventListener("load", function () {
                setTimeout(function () {
                    var splash = document.getElementById("splash");
                    if (splash) splash.classList.add("hidden");
                }, 800);
            });

            // Register service worker for PWA
            if ("serviceWorker" in navigator) {
                navigator.serviceWorker.register("/sw.js").catch(function () {});
            }
        </script>
    </body>
</html>
