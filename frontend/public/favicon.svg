<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- "C" letterform made of 3 comparison bars with arrows -->
  <!-- Top bar -->
  <rect x="7" y="7" width="12" height="3.5" rx="1.75" fill="white" opacity="0.95"/>
  <polygon points="20,7 20,10.5 23,8.75" fill="white" opacity="0.95"/>

  <!-- Middle bar (shorter = comparison visual) -->
  <rect x="7" y="14.25" width="9" height="3.5" rx="1.75" fill="white" opacity="0.6"/>
  <polygon points="17,14.25 17,17.75 20,16" fill="white" opacity="0.6"/>

  <!-- Bottom bar -->
  <rect x="7" y="21.5" width="12" height="3.5" rx="1.75" fill="white" opacity="0.95"/>
  <polygon points="20,21.5 20,25 23,23.25" fill="white" opacity="0.95"/>

  <!-- Comparison dots on right -->
  <circle cx="26" cy="8.75" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="26" cy="16" r="1.5" fill="white" opacity="0.25"/>
  <circle cx="26" cy="23.25" r="1.5" fill="white" opacity="0.4"/>
</svg>
